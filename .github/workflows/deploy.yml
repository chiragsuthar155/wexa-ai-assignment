name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/statuspulse:${{ github.sha }} .
          docker tag ghcr.io/${{ github.repository }}/statuspulse:${{ github.sha }} ghcr.io/${{ github.repository }}/statuspulse:latest

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}/statuspulse:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/statuspulse:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/statuspulse
            bash scripts/deploy.sh

      - name: Health Check
        run: curl -f https://${{ secrets.DOMAIN }}/health

      - name: Discord Notification
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"Deployment completed for StatusPulse"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
